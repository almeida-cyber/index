<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mensagem Especial</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff4e50, #fc913a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4e50;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            color: #333;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #ff4e50;
            color: white;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e63e40;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Oi você 👀</h1>
    <p>Clique no botão abaixo para uma mensagem especial...</p>
    <button onclick="mostrarMensagem()">Clique aqui</button>
    <p id="mensagem"></p>
</div>

<script>
    function mostrarMensagem() {
        document.getElementById("mensagem").innerText = "Vai se danar 😜 (brincadeira!)";
    }
</script>

</body>
</html>
